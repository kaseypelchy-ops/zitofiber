<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zito FieldOS</title>
</head>
<body>
<script>
let repName = null;
let repOnline = true;
let megaSales = 0;
let gigSales = 0;

let sessionStart = localStorage.getItem('fieldos_session_start');
if (!sessionStart) {
  sessionStart = new Date().toISOString();
  localStorage.setItem('fieldos_session_start', sessionStart);
}

function getDoorsWorked() {
  return Number(localStorage.getItem('fieldos_doors_worked') || 0);
}

function setDoorsWorked(val) {
  localStorage.setItem('fieldos_doors_worked', String(val));
}

function incrementDoorsWorkedOnce(addressId) {
  let ids = JSON.parse(localStorage.getItem('fieldos_door_ids') || '[]');
  if (ids.includes(addressId)) return;
  ids.push(addressId);
  localStorage.setItem('fieldos_door_ids', JSON.stringify(ids));
  setDoorsWorked(getDoorsWorked() + 1);
}

function sendHeartbeat() {
  if (!repName) return;

  fetch('YOUR_WEB_APP_URL', {
    method: 'POST',
    headers: { 'Content-Type':'application/json' },
    body: JSON.stringify({
      type: 'rep_heartbeat',
      salesperson: repName,
      status: repOnline ? 'online' : 'offline',
      megaSales: megaSales,
      gigSales: gigSales,
      firstSeen: sessionStart,
      doorsWorked: getDoorsWorked()
    })
  }).catch(()=>{});
}
</script>
</body>
</html>
